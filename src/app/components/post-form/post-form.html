<div class="post-form-container">
  <h2>{{ isEditMode ? '✏️ Modifier le post' : '➕ Créer un nouveau post' }}</h2>
  
  <form (ngSubmit)="onSubmit()">
    <!-- Contenu du post -->
    <div class="form-group">
      <label for="content">Contenu du post *</label>
      <textarea 
        id="content"
        [(ngModel)]="content"
        name="content"
        rows="5"
        placeholder="Qu'avez-vous à partager ?"
        required
      ></textarea>
      <small>{{ content.length }} / 280 caractères</small>
    </div>

    <!-- Date de publication -->
    <div class="form-row">
      <div class="form-group">
        <label for="scheduledDate">Date de publication *</label>
        <input 
          type="date"
          id="scheduledDate"
          [(ngModel)]="scheduledDate"
          name="scheduledDate"
          required
        />
      </div>

      <div class="form-group">
        <label for="scheduledTime">Heure *</label>
        <input 
          type="time"
          id="scheduledTime"
          [(ngModel)]="scheduledTime"
          name="scheduledTime"
          required
        />
      </div>
    </div>

    <!-- Aperçu image (optionnel) -->
    <div class="form-group">
      <label for="imagePreview">URL de l'image (optionnel)</label>
      <input 
        type="url"
        id="imagePreview"
        [(ngModel)]="imagePreview"
        name="imagePreview"
        placeholder="https://example.com/image.jpg"
      />
    </div>

    <!-- Prévisualisation image -->
    <div class="image-preview" *ngIf="imagePreview">
      <img [src]="imagePreview" alt="Aperçu" />
    </div>

    <!-- Boutons -->
    <div class="form-buttons">
      <button type="submit" class="btn-primary">
        {{ isEditMode ? '💾 Enregistrer les modifications' : '➕ Créer le post' }}
      </button>
      
      <button 
        *ngIf="isEditMode" 
        type="button" 
        class="btn-cancel" 
        (click)="cancelEdit()"
      >
        ❌ Annuler
      </button>
    </div>
  </form>
</div>
